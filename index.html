<!DOCTYPE html>
<!-- Pixel Art Studio Industrial Edition: estructura en 2 columnas (canvas + sidebar) -->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Art Studio — Industrial Edition</title>
  <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
  <link rel="stylesheet" href="src/style.css">
</head>
<body>

  <div class="app">

    <!-- Encabezado: título + versión -->
    <header class="app-header">
      <h1>Pixel Art Studio</h1>
      <span class="badge">v3.0</span>
      <span class="subtitle">Industrial Edition</span>
    </header>

    <!-- Cuerpo principal: 2 columnas (canvas | sidebar) -->
    <main class="app-main">

      <!-- ==================== Columna izquierda: Canvas ==================== -->
      <section class="canvas-column">

        <!-- Contenedor del canvas con borde metálico -->
        <div class="canvas-wrapper">
          <div class="canvas-border">
            <!-- Lienzo principal: buffer 480×480, id usado por script.js -->
            <canvas id="pixelCanvas" width="480" height="480"></canvas>

            <!-- HUD superpuesto sobre el canvas: coordenadas + previsualización de color -->
            <div class="hud">
              <span class="hud-coords" id="hudCoords">X: 00 | Y: 00</span>
              <span class="hud-swatch" id="hudSwatch" style="background:#ff4444"></span>
            </div>
          </div>
        </div>

      </section>

      <!-- ==================== Columna derecha: Sidebar ==================== -->
      <aside class="sidebar">

        <!-- Herramientas de dibujo -->
        <div class="panel-section">
          <h3>Herramientas</h3>
          <div class="tool-grid">
            <!-- data-tool → script.js identifica la herramienta -->
            <button class="tool-btn active" data-tool="brush" title="Pincel (B)" aria-label="Pincel">
              <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M13.5 2L12 3.5 16 7.5 17.5 6 13.5 2M7.5 8L6 9.5 10 13.5 11.5 12 7.5 8M10 10.5L8.5 12 12 15.5 13.5 14 10 10.5M18.5 4L17 5.5 19 7.5 20.5 6 18.5 4M20.16 6.16L10 16.34 13.66 20 23.84 9.84 20.16 6.16M3 17.25C3 17.25 5.75 18.5 6.5 19.25S7.75 21 7.75 21C7.75 21 5.5 22.25 4.5 22S2 21 2 21 3 20 3 17.25Z"/></svg>
            </button>
            <button class="tool-btn" data-tool="eraser" title="Borrador (E)" aria-label="Borrador">
              <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M16.24 3.56L21.19 8.5C21.97 9.29 21.97 10.5 21.19 11.29L12.7 19.78C11.91 20.57 10.7 20.57 9.91 19.78L5.5 15.37L6.91 13.96L10.67 17.72L18.07 10.32L12.4 4.65L9.56 7.5L10.97 8.91L8.85 11.03L4.97 7.15C4.18 6.36 4.18 5.15 4.97 4.36L8.15 1.19C8.94 0.4 10.15 0.4 10.94 1.19L13.76 4L16.24 3.56M3 20H13L15 22H3V20Z"/></svg>
            </button>
            <button class="tool-btn" data-tool="fill" title="Bote de pintura" aria-label="Bote de pintura">
              <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M19 11.5S17 14.17 17 16.5C17 18 18 19 19 19S21 18 21 16.5C21 14.17 19 11.5 19 11.5M5.21 10L10 5.21L14.79 10M16.56 8.94L7.62 0L6.21 1.41L8.59 3.79L3.44 8.94C2.85 9.53 2.85 10.47 3.44 11.06L8.94 16.56C9.23 16.85 9.62 17 10 17S10.77 16.85 11.06 16.56L16.56 11.06C17.15 10.47 17.15 9.53 16.56 8.94Z"/></svg>
            </button>
            <button class="tool-btn" data-tool="shade" title="Sombrear (S)" aria-label="Sombrear">
              <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93s3.05-7.44 7-7.93v15.86z"/></svg>
            </button>
            <!-- Cuentagotas: captura el color del píxel y vuelve al pincel -->
            <button class="tool-btn" data-tool="dropper" title="Cuentagotas (I)" aria-label="Cuentagotas">
              <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M19.35 11.72l-7.07-7.07c-.39-.39-1.02-.39-1.41 0l-3.18 3.18c-.39.39-.39 1.02 0 1.41l7.07 7.07c.39.39 1.02.39 1.41 0l3.18-3.18c.39-.39.39-1.02 0-1.41zM17.24 10.3l-2.12-2.12 1.41-1.41 2.12 2.12-1.41 1.41zM4 20l3.54-3.54-1.06-1.06L4 20z"/></svg>
            </button>
          </div>
          <div class="tool-indicator" id="toolIndicator" aria-live="polite">Pincel</div>
        </div>

        <!-- Tamaño de pincel: slider N×N -->
        <div class="panel-section">
          <h3>Pincel</h3>
          <div class="brush-row">
            <input type="range" id="brushSizeSlider" min="1" max="5" value="1" aria-label="Tamaño de pincel">
            <span id="brushSizeLabel">1×1</span>
          </div>
        </div>

        <!-- Simetría: modo espejo, volteos y completar mitad -->
        <div class="panel-section">
          <h3>Simetría</h3>
          <div class="symmetry-grid">
            <button class="sym-btn" data-axis="H" title="Simetría Horizontal (espejo H)" aria-label="Simetría Horizontal">H</button>
            <button class="sym-btn" data-axis="V" title="Simetría Vertical (espejo V)" aria-label="Simetría Vertical">V</button>
          </div>
          <div class="sym-actions">
            <button class="btn-flip" id="flipHBtn" title="Voltear horizontalmente">Flip H</button>
            <button class="btn-flip" id="flipVBtn" title="Voltear verticalmente">Flip V</button>
          </div>
          <button class="btn" id="completeHalfBtn">Completar Mitad</button>
        </div>

        <!-- Color: selector + muestra visual -->
        <div class="panel-section">
          <h3>Color</h3>
          <div class="color-row">
            <input type="color" id="colorPicker" value="#ff4444" aria-label="Selector de color">
            <div class="color-swatch" id="colorSwatch" style="background:#ff4444"></div>
          </div>
        </div>

        <!-- Tamaño del lienzo -->
        <div class="panel-section">
          <h3>Lienzo</h3>
          <select id="gridSizeSelect" class="grid-size-select" aria-label="Tamaño de cuadrícula">
            <option value="16">16 x 16</option>
            <option value="32" selected>32 x 32</option>
            <option value="64">64 x 64</option>
          </select>
        </div>

        <!-- Paleta rápida: 8 colores retro/industrial -->
        <div class="panel-section">
          <h3>Paleta rápida</h3>
          <div class="quick-palette" id="quickPalette"></div>
          <!-- Guarda el color actual en la paleta -->
          <button class="btn-small" id="saveColorBtn" aria-label="Guardar color">Guardar color</button>
        </div>

        <!-- Acciones: limpiar, exportar, guardar/cargar proyecto -->
        <div class="panel-section">
          <h3>Acciones</h3>
          <button class="btn" id="clearBtn">Limpiar lienzo</button>
          <button class="btn btn-primary" id="exportBtn">Exportar PNG</button>
          <button class="btn" id="saveProjectBtn">Guardar Proyecto</button>
          <button class="btn" id="loadProjectBtn">Cargar Proyecto</button>
          <!-- Input oculto para cargar archivo .json -->
          <input type="file" id="loadFileInput" accept=".json" style="display:none">
        </div>

        <!-- Atajos de teclado (estilo técnico) -->
        <div class="shortcuts-panel">
          <h3>Atajos de teclado</h3>
          <div class="shortcut-row"><kbd>B</kbd><span>Pincel</span></div>
          <div class="shortcut-row"><kbd>E</kbd><span>Borrador</span></div>
          <div class="shortcut-row"><kbd>S</kbd><span>Sombrear</span></div>
          <div class="shortcut-row"><kbd>C</kbd><span>Limpiar lienzo</span></div>
          <div class="shortcut-row"><kbd>G</kbd><span>Alternar cuadrícula</span></div>
          <div class="shortcut-row"><kbd>I</kbd><span>Cuentagotas</span></div>
          <div class="shortcut-row"><kbd>Ctrl+Z</kbd><span>Deshacer</span></div>
        </div>

      </aside>
    </main>
  </div>

  <!-- script.js al final: DOM ya renderizado + no bloquea el paint -->
  <script src="src/script.js"></script>
</body>
</html>
